events {}

http {
    upstream backend_servers {
        # Load balance between multiple backend services (e.g., your application servers)
        server backend_redis_stack:6379;
        server backend_postgres:5432;
    }

    server {
        listen 8080;

        # Reverse Proxy
        location /api/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve Static Files
        location /static/ {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Handle Payload (Optional)
        location / {
            proxy_pass http://backend_servers;
            client_max_body_size 10M; # Adjust payload size if necessary
        }
    }
}
